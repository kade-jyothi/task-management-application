<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Management - Standalone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            color: #667eea;
            margin-bottom: 0.5rem;
        }

        .form-container {
            margin-bottom: 1rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 0.75rem;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 1rem;
        }

        .btn:hover {
            background: #5a6fd8;
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-danger {
            background: #dc3545;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .toggle {
            text-align: center;
            color: #666;
        }

        .toggle a {
            color: #667eea;
            text-decoration: none;
        }

        .toggle a:hover {
            text-decoration: underline;
        }

        .message {
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 5px;
            text-align: center;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .hidden {
            display: none;
        }

        .dashboard {
            text-align: center;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: #f8f9fa;
            padding: 1rem;
            border-radius: 5px;
            text-align: center;
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #666;
        }

        .task-form {
            background: #f8f9fa;
            padding: 1.5rem;
            border-radius: 5px;
            margin-bottom: 2rem;
            text-align: left;
        }

        .task-item {
            background: white;
            border: 1px solid #ddd;
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 5px;
            text-align: left;
        }

        .task-item.completed {
            opacity: 0.7;
            text-decoration: line-through;
        }

        .task-item h4 {
            margin-bottom: 0.5rem;
            color: #333;
        }

        .task-item p {
            color: #666;
            margin-bottom: 0.5rem;
        }

        .task-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.9rem;
            color: #888;
            flex-wrap: wrap;
        }

        .task-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .task-actions button {
            padding: 0.25rem 0.5rem;
            font-size: 0.8rem;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }

        .complete-btn {
            background: #28a745;
            color: white;
        }

        .delete-btn {
            background: #dc3545;
            color: white;
        }

        .edit-btn {
            background: #ffc107;
            color: black;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Form -->
        <div id="loginForm" class="form-container">
            <div class="header">
                <h1>Thiranex</h1>
                <p>Task Management System</p>
            </div>
            <div id="loginMessage"></div>
            <form id="loginFormElement">
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                </div>
                <button type="submit" class="btn" id="loginBtn">Login</button>
            </form>
            <div class="toggle">
                Don't have an account? <a href="#" onclick="showRegister()">Register</a>
            </div>
        </div>

        <!-- Register Form -->
        <div id="registerForm" class="form-container hidden">
            <div class="header">
                <h1>Thiranex</h1>
                <p>Create Account</p>
            </div>
            <div id="registerMessage"></div>
            <form id="registerFormElement">
                <div class="form-group">
                    <label for="regUsername">Username:</label>
                    <input type="text" id="regUsername" name="username" required placeholder="Choose username">
                </div>
                <div class="form-group">
                    <label for="regEmail">Email:</label>
                    <input type="email" id="regEmail" name="email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="regFirstName">First Name:</label>
                    <input type="text" id="regFirstName" name="firstName" required placeholder="First name">
                </div>
                <div class="form-group">
                    <label for="regLastName">Last Name:</label>
                    <input type="text" id="regLastName" name="lastName" required placeholder="Last name">
                </div>
                <div class="form-group">
                    <label for="regPassword">Password:</label>
                    <input type="password" id="regPassword" name="password" required placeholder="Create password (min 6 chars)">
                </div>
                <button type="submit" class="btn" id="registerBtn">Register</button>
            </form>
            <div class="toggle">
                Already have an account? <a href="#" onclick="showLogin()">Login</a>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" class="dashboard hidden">
            <div class="header">
                <h1>Task Dashboard</h1>
                <p id="welcomeMessage"></p>
            </div>
            
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-number" id="totalTasks">0</div>
                    <div class="stat-label">Total Tasks</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="completedTasks">0</div>
                    <div class="stat-label">Completed</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="pendingTasks">0</div>
                    <div class="stat-label">Pending</div>
                </div>
            </div>

            <button class="btn btn-danger" onclick="logout()">Logout</button>
            
            <div class="task-form">
                <h3 id="taskFormTitle">Add New Task</h3>
                <div id="taskMessage"></div>
                <form id="taskForm">
                    <input type="hidden" id="editingTaskId" value="">
                    <div class="form-group">
                        <label for="taskTitle">Title:</label>
                        <input type="text" id="taskTitle" required placeholder="Task title">
                    </div>
                    <div class="form-group">
                        <label for="taskDescription">Description:</label>
                        <textarea id="taskDescription" rows="3" required placeholder="Task description"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="taskDueDate">Due Date:</label>
                        <input type="date" id="taskDueDate" required>
                    </div>
                    <div class="form-group">
                        <label for="taskPriority">Priority:</label>
                        <select id="taskPriority">
                            <option value="low">Low</option>
                            <option value="medium" selected>Medium</option>
                            <option value="high">High</option>
                            <option value="urgent">Urgent</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="taskCategory">Category:</label>
                        <select id="taskCategory">
                            <option value="work">Work</option>
                            <option value="personal">Personal</option>
                            <option value="study">Study</option>
                            <option value="health">Health</option>
                            <option value="finance">Finance</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <button type="submit" class="btn" id="taskSubmitBtn">Add Task</button>
                    <button type="button" class="btn" id="cancelEditBtn" onclick="cancelEdit()" style="display:none;">Cancel Edit</button>
                </form>
            </div>

            <div>
                <h3>Your Tasks</h3>
                <div id="tasksList">
                    <p>Loading tasks...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Local Storage Management
        class TaskManager {
            constructor() {
                this.users = JSON.parse(localStorage.getItem('users') || '[]');
                this.currentUser = null;
                this.tasks = [];
                this.init();
            }

            init() {
                this.checkSession();
                this.setupEventListeners();
                this.setDefaultDueDate();
            }

            setupEventListeners() {
                // Login form
                document.getElementById('loginFormElement').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.handleLogin();
                });

                // Register form
                document.getElementById('registerFormElement').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.handleRegister();
                });

                // Task form
                document.getElementById('taskForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.handleTaskSubmit();
                });
            }

            setDefaultDueDate() {
                const tomorrow = new Date();
                tomorrow.setDate(tomorrow.getDate() + 1);
                const taskDueDate = document.getElementById('taskDueDate');
                if (taskDueDate) {
                    taskDueDate.value = tomorrow.toISOString().split('T')[0];
                }
            }

            // Authentication Methods
            handleLogin() {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                const user = this.users.find(u => u.email === email && u.password === password);

                if (user) {
                    this.currentUser = user;
                    localStorage.setItem('currentUser', JSON.stringify(user));
                    this.showMessage('loginMessage', 'Login successful!', 'success');
                    setTimeout(() => {
                        this.showDashboard();
                    }, 1000);
                } else {
                    this.showMessage('loginMessage', 'Invalid email or password', 'error');
                }
            }

            handleRegister() {
                const username = document.getElementById('regUsername').value;
                const email = document.getElementById('regEmail').value;
                const firstName = document.getElementById('regFirstName').value;
                const lastName = document.getElementById('regLastName').value;
                const password = document.getElementById('regPassword').value;

                // Check if user already exists
                if (this.users.find(u => u.email === email)) {
                    this.showMessage('registerMessage', 'Email already registered', 'error');
                    return;
                }

                if (this.users.find(u => u.username === username)) {
                    this.showMessage('registerMessage', 'Username already taken', 'error');
                    return;
                }

                if (password.length < 6) {
                    this.showMessage('registerMessage', 'Password must be at least 6 characters', 'error');
                    return;
                }

                // Create new user
                const newUser = {
                    id: Date.now().toString(),
                    username,
                    email,
                    firstName,
                    lastName,
                    password,
                    createdAt: new Date().toISOString()
                };

                this.users.push(newUser);
                localStorage.setItem('users', JSON.stringify(this.users));

                this.showMessage('registerMessage', 'Registration successful!', 'success');
                setTimeout(() => {
                    this.currentUser = newUser;
                    localStorage.setItem('currentUser', JSON.stringify(newUser));
                    this.showDashboard();
                }, 1000);
            }

            checkSession() {
                const savedUser = localStorage.getItem('currentUser');
                if (savedUser) {
                    this.currentUser = JSON.parse(savedUser);
                    this.showDashboard();
                }
            }

            logout() {
                this.currentUser = null;
                localStorage.removeItem('currentUser');
                this.showLogin();
            }

            // Task Management Methods
            handleTaskSubmit() {
                const title = document.getElementById('taskTitle').value;
                const description = document.getElementById('taskDescription').value;
                const dueDate = document.getElementById('taskDueDate').value;
                const priority = document.getElementById('taskPriority').value;
                const category = document.getElementById('taskCategory').value;
                const editingId = document.getElementById('editingTaskId').value;

                if (editingId) {
                    // Update existing task
                    const taskIndex = this.tasks.findIndex(t => t.id === editingId);
                    if (taskIndex !== -1) {
                        this.tasks[taskIndex] = {
                            ...this.tasks[taskIndex],
                            title,
                            description,
                            dueDate,
                            priority,
                            category,
                            updatedAt: new Date().toISOString()
                        };
                        this.showMessage('taskMessage', 'Task updated successfully!', 'success');
                    }
                    this.cancelEdit();
                } else {
                    // Create new task
                    const newTask = {
                        id: Date.now().toString(),
                        title,
                        description,
                        dueDate,
                        priority,
                        category,
                        status: 'pending',
                        userId: this.currentUser.id,
                        createdAt: new Date().toISOString()
                    };

                    this.tasks.push(newTask);
                    this.showMessage('taskMessage', 'Task added successfully!', 'success');
                }

                this.saveTasks();
                this.loadTasks();
                document.getElementById('taskForm').reset();
                this.setDefaultDueDate();
            }

            editTask(taskId) {
                const task = this.tasks.find(t => t.id === taskId);
                if (task) {
                    document.getElementById('taskFormTitle').textContent = 'Edit Task';
                    document.getElementById('taskTitle').value = task.title;
                    document.getElementById('taskDescription').value = task.description;
                    document.getElementById('taskDueDate').value = task.dueDate;
                    document.getElementById('taskPriority').value = task.priority;
                    document.getElementById('taskCategory').value = task.category;
                    document.getElementById('editingTaskId').value = task.id;
                    document.getElementById('taskSubmitBtn').textContent = 'Update Task';
                    document.getElementById('cancelEditBtn').style.display = 'block';
                }
            }

            cancelEdit() {
                document.getElementById('taskFormTitle').textContent = 'Add New Task';
                document.getElementById('taskForm').reset();
                document.getElementById('editingTaskId').value = '';
                document.getElementById('taskSubmitBtn').textContent = 'Add Task';
                document.getElementById('cancelEditBtn').style.display = 'none';
                this.setDefaultDueDate();
            }

            deleteTask(taskId) {
                if (confirm('Are you sure you want to delete this task?')) {
                    this.tasks = this.tasks.filter(t => t.id !== taskId);
                    this.saveTasks();
                    this.loadTasks();
                    this.showMessage('taskMessage', 'Task deleted successfully!', 'success');
                }
            }

            toggleTaskStatus(taskId) {
                const task = this.tasks.find(t => t.id === taskId);
                if (task) {
                    task.status = task.status === 'completed' ? 'pending' : 'completed';
                    task.completedAt = task.status === 'completed' ? new Date().toISOString() : null;
                    this.saveTasks();
                    this.loadTasks();
                }
            }

            saveTasks() {
                localStorage.setItem('tasks', JSON.stringify(this.tasks));
            }

            loadTasks() {
                // Load tasks for current user
                const allTasks = JSON.parse(localStorage.getItem('tasks') || '[]');
                this.tasks = allTasks.filter(t => t.userId === this.currentUser.id);
                
                this.renderTasks();
                this.updateStats();
            }

            renderTasks() {
                const tasksList = document.getElementById('tasksList');
                
                if (this.tasks.length === 0) {
                    tasksList.innerHTML = '<p>No tasks yet. Add your first task above!</p>';
                    return;
                }

                // Sort tasks by due date
                const sortedTasks = [...this.tasks].sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate));

                tasksList.innerHTML = sortedTasks.map(task => `
                    <div class="task-item ${task.status === 'completed' ? 'completed' : ''}">
                        <h4>${task.title}</h4>
                        <p>${task.description}</p>
                        <div class="task-meta">
                            <span>Priority: ${task.priority}</span>
                            <span>Category: ${task.category}</span>
                            <span>Due: ${new Date(task.dueDate).toLocaleDateString()}</span>
                            <span>Status: ${task.status}</span>
                        </div>
                        <div class="task-actions">
                            <button class="complete-btn" onclick="taskManager.toggleTaskStatus('${task.id}')">
                                ${task.status === 'completed' ? 'Undo' : 'Complete'}
                            </button>
                            <button class="edit-btn" onclick="taskManager.editTask('${task.id}')">Edit</button>
                            <button class="delete-btn" onclick="taskManager.deleteTask('${task.id}')">Delete</button>
                        </div>
                    </div>
                `).join('');
            }

            updateStats() {
                const total = this.tasks.length;
                const completed = this.tasks.filter(t => t.status === 'completed').length;
                const pending = total - completed;

                document.getElementById('totalTasks').textContent = total;
                document.getElementById('completedTasks').textContent = completed;
                document.getElementById('pendingTasks').textContent = pending;
            }

            // UI Methods
            showLogin() {
                document.getElementById('loginForm').classList.remove('hidden');
                document.getElementById('registerForm').classList.add('hidden');
                document.getElementById('dashboard').classList.add('hidden');
                this.clearMessages();
            }

            showRegister() {
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('registerForm').classList.remove('hidden');
                document.getElementById('dashboard').classList.add('hidden');
                this.clearMessages();
            }

            showDashboard() {
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('registerForm').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                this.clearMessages();
                
                document.getElementById('welcomeMessage').textContent = `Welcome, ${this.currentUser.firstName} ${this.currentUser.lastName}!`;
                this.loadTasks();
            }

            showMessage(elementId, message, type) {
                const messageEl = document.getElementById(elementId);
                messageEl.innerHTML = `<div class="message ${type}">${message}</div>`;
                setTimeout(() => {
                    messageEl.innerHTML = '';
                }, 3000);
            }

            clearMessages() {
                document.getElementById('loginMessage').innerHTML = '';
                document.getElementById('registerMessage').innerHTML = '';
                document.getElementById('taskMessage').innerHTML = '';
            }
        }

        // Global functions for onclick handlers
        let taskManager;
        
        function showRegister() {
            taskManager.showRegister();
        }

        function showLogin() {
            taskManager.showLogin();
        }

        function logout() {
            taskManager.logout();
        }

        function cancelEdit() {
            taskManager.cancelEdit();
        }

        // Initialize the application
        document.addEventListener('DOMContentLoaded', () => {
            taskManager = new TaskManager();
        });
    </script>
</body>
</html>
