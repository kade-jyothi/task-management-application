<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Management - Simple Auth</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            color: #667eea;
            margin-bottom: 0.5rem;
        }

        .form-container {
            margin-bottom: 1rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 0.75rem;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 1rem;
        }

        .btn:hover {
            background: #5a6fd8;
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .toggle {
            text-align: center;
            color: #666;
        }

        .toggle a {
            color: #667eea;
            text-decoration: none;
        }

        .toggle a:hover {
            text-decoration: underline;
        }

        .message {
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 5px;
            text-align: center;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .hidden {
            display: none;
        }

        .dashboard {
            text-align: center;
        }

        .dashboard h2 {
            color: #667eea;
            margin-bottom: 2rem;
        }

        .task-form {
            background: #f8f9fa;
            padding: 1.5rem;
            border-radius: 5px;
            margin-bottom: 2rem;
            text-align: left;
        }

        .task-item {
            background: white;
            border: 1px solid #ddd;
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 5px;
            text-align: left;
        }

        .task-item h4 {
            margin-bottom: 0.5rem;
            color: #333;
        }

        .task-item p {
            color: #666;
            margin-bottom: 0.5rem;
        }

        .task-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.9rem;
            color: #888;
        }

        .logout-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 2rem;
        }

        .logout-btn:hover {
            background: #c82333;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Form -->
        <div id="loginForm" class="form-container">
            <div class="header">
                <h1>Thiranex</h1>
                <p>Task Management</p>
            </div>
            <div id="loginMessage"></div>
            <form id="loginFormElement">
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                </div>
                <button type="submit" class="btn" id="loginBtn">Login</button>
            </form>
            <div class="toggle">
                Don't have an account? <a href="#" onclick="showRegister()">Register</a>
            </div>
        </div>

        <!-- Register Form -->
        <div id="registerForm" class="form-container hidden">
            <div class="header">
                <h1>Thiranex</h1>
                <p>Register Account</p>
            </div>
            <div id="registerMessage"></div>
            <form id="registerFormElement">
                <div class="form-group">
                    <label for="regUsername">Username:</label>
                    <input type="text" id="regUsername" name="username" required placeholder="Choose username">
                </div>
                <div class="form-group">
                    <label for="regEmail">Email:</label>
                    <input type="email" id="regEmail" name="email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="regFirstName">First Name:</label>
                    <input type="text" id="regFirstName" name="firstName" required placeholder="First name">
                </div>
                <div class="form-group">
                    <label for="regLastName">Last Name:</label>
                    <input type="text" id="regLastName" name="lastName" required placeholder="Last name">
                </div>
                <div class="form-group">
                    <label for="regPassword">Password:</label>
                    <input type="password" id="regPassword" name="password" required placeholder="Create password (min 6 chars)">
                </div>
                <button type="submit" class="btn" id="registerBtn">Register</button>
            </form>
            <div class="toggle">
                Already have an account? <a href="#" onclick="showLogin()">Login</a>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" class="dashboard hidden">
            <div class="header">
                <h1>Task Dashboard</h1>
                <p id="welcomeMessage"></p>
            </div>
            <button class="logout-btn" onclick="logout()">Logout</button>
            
            <div class="task-form">
                <h3>Add New Task</h3>
                <div id="taskMessage"></div>
                <form id="taskForm">
                    <div class="form-group">
                        <label for="taskTitle">Title:</label>
                        <input type="text" id="taskTitle" required placeholder="Task title">
                    </div>
                    <div class="form-group">
                        <label for="taskDescription">Description:</label>
                        <input type="text" id="taskDescription" required placeholder="Task description">
                    </div>
                    <div class="form-group">
                        <label for="taskDueDate">Due Date:</label>
                        <input type="date" id="taskDueDate" required>
                    </div>
                    <div class="form-group">
                        <label for="taskPriority">Priority:</label>
                        <select id="taskPriority">
                            <option value="low">Low</option>
                            <option value="medium" selected>Medium</option>
                            <option value="high">High</option>
                            <option value="urgent">Urgent</option>
                        </select>
                    </div>
                    <button type="submit" class="btn">Add Task</button>
                </form>
            </div>

            <div>
                <h3>Your Tasks</h3>
                <div id="tasksList">
                    <p>Loading tasks...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000/api';
        let currentUser = null;
        let authToken = null;

        // Show/hide forms
        function showRegister() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
            clearMessages();
        }

        function showLogin() {
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
            clearMessages();
        }

        function showDashboard() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
        }

        function showMessage(elementId, message, type) {
            const messageEl = document.getElementById(elementId);
            messageEl.innerHTML = `<div class="message ${type}">${message}</div>`;
            setTimeout(() => {
                messageEl.innerHTML = '';
            }, 5000);
        }

        function clearMessages() {
            document.getElementById('loginMessage').innerHTML = '';
            document.getElementById('registerMessage').innerHTML = '';
            document.getElementById('taskMessage').innerHTML = '';
        }

        // API functions
        async function apiRequest(endpoint, options = {}) {
            try {
                const config = {
                    headers: {
                        'Content-Type': 'application/json',
                        ...(authToken && { Authorization: `Bearer ${authToken}` })
                    },
                    ...options
                };

                const response = await fetch(`${API_BASE}${endpoint}`, config);
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Request failed');
                }

                return data;
            } catch (error) {
                console.error('API Error:', error);
                throw error;
            }
        }

        // Login
        document.getElementById('loginFormElement').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.textContent = 'Logging in...';

            try {
                const formData = new FormData(e.target);
                const data = Object.fromEntries(formData);

                const response = await apiRequest('/auth/login', {
                    method: 'POST',
                    body: JSON.stringify(data)
                });

                authToken = response.data.token;
                currentUser = response.data.user;
                
                localStorage.setItem('token', authToken);
                localStorage.setItem('user', JSON.stringify(currentUser));

                showMessage('loginMessage', 'Login successful!', 'success');
                setTimeout(() => {
                    showDashboard();
                    loadDashboard();
                }, 1000);

            } catch (error) {
                showMessage('loginMessage', error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Login';
            }
        });

        // Register
        document.getElementById('registerFormElement').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');
            btn.disabled = true;
            btn.textContent = 'Registering...';

            try {
                const formData = new FormData(e.target);
                const data = Object.fromEntries(formData);

                const response = await apiRequest('/auth/register', {
                    method: 'POST',
                    body: JSON.stringify(data)
                });

                authToken = response.data.token;
                currentUser = response.data.user;
                
                localStorage.setItem('token', authToken);
                localStorage.setItem('user', JSON.stringify(currentUser));

                showMessage('registerMessage', 'Registration successful!', 'success');
                setTimeout(() => {
                    showDashboard();
                    loadDashboard();
                }, 1000);

            } catch (error) {
                showMessage('registerMessage', error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Register';
            }
        });

        // Add Task
        document.getElementById('taskForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.textContent = 'Adding...';

            try {
                const formData = new FormData(e.target);
                const data = Object.fromEntries(formData);

                await apiRequest('/tasks', {
                    method: 'POST',
                    body: JSON.stringify(data)
                });

                showMessage('taskMessage', 'Task added successfully!', 'success');
                e.target.reset();
                loadTasks();

            } catch (error) {
                showMessage('taskMessage', error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Add Task';
            }
        });

        // Load dashboard
        function loadDashboard() {
            document.getElementById('welcomeMessage').textContent = `Welcome, ${currentUser.firstName}!`;
            loadTasks();
        }

        // Load tasks
        async function loadTasks() {
            try {
                const response = await apiRequest('/tasks');
                const tasks = response.data.tasks;
                const tasksList = document.getElementById('tasksList');

                if (tasks.length === 0) {
                    tasksList.innerHTML = '<p>No tasks yet. Add your first task above!</p>';
                } else {
                    tasksList.innerHTML = tasks.map(task => `
                        <div class="task-item">
                            <h4>${task.title}</h4>
                            <p>${task.description}</p>
                            <div class="task-meta">
                                <span>Status: ${task.status}</span>
                                <span>Priority: ${task.priority}</span>
                                <span>Due: ${new Date(task.dueDate).toLocaleDateString()}</span>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                document.getElementById('tasksList').innerHTML = '<p>Failed to load tasks</p>';
            }
        }

        // Logout
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            authToken = null;
            currentUser = null;
            showLogin();
        }

        // Check existing session
        function checkSession() {
            const token = localStorage.getItem('token');
            const user = localStorage.getItem('user');
            
            if (token && user) {
                authToken = token;
                currentUser = JSON.parse(user);
                showDashboard();
                loadDashboard();
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            checkSession();
            
            // Set default due date to tomorrow
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            document.getElementById('taskDueDate').value = tomorrow.toISOString().split('T')[0];
        });
    </script>
</body>
</html>
